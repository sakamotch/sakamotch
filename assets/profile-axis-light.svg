<svg xmlns="http://www.w3.org/2000/svg" width="800" height="170" viewBox="0 0 800 170" role="img" aria-label="What I work on and what I care about">
  <style>
    .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #475569; }
    .text { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #0f172a; }
    .arrow-line { stroke: #94a3b8; stroke-width: 2.5; stroke-linecap: round; }
    .arrow-head { fill: #94a3b8; }
  </style>
  <rect width="800" height="170" fill="transparent"/>
  <text x="240" y="34" text-anchor="middle" class="label">What I work on</text>
  <text x="560" y="34" text-anchor="middle" class="label">What I care about</text>

  <text x="240" y="76" text-anchor="middle" class="text">hard problems</text>
  <line x1="388" y1="69" x2="412" y2="69" class="arrow-line"/>
  <polygon points="382,69 389,65 389,73" class="arrow-head"/>
  <polygon points="418,69 411,65 411,73" class="arrow-head"/>
  <text x="560" y="76" text-anchor="middle" class="text">natural use</text>

  <text x="240" y="112" text-anchor="middle" class="text">real-world data</text>
  <line x1="388" y1="105" x2="412" y2="105" class="arrow-line"/>
  <polygon points="382,105 389,101 389,109" class="arrow-head"/>
  <polygon points="418,105 411,101 411,109" class="arrow-head"/>
  <text x="560" y="112" text-anchor="middle" class="text">low friction</text>

  <text x="240" y="148" text-anchor="middle" class="text">intelligent systems</text>
  <line x1="388" y1="141" x2="412" y2="141" class="arrow-line"/>
  <polygon points="382,141 389,137 389,145" class="arrow-head"/>
  <polygon points="418,141 411,137 411,145" class="arrow-head"/>
  <text x="560" y="148" text-anchor="middle" class="text">elegant design</text>
</svg>
